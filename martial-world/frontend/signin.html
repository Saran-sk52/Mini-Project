<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Martial World - Signin</title>
  <!-- Firebase App -->
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
  <!-- Firebase Firestore -->
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>


  <style>
    body {
      margin: 0;
      font-family: 'Roboto Slab', serif;
      background: url('images/martial_login.png') no-repeat center center fixed;
      background-size: cover;
      color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      animation: backgroundPulse 10s infinite alternate ease-in-out;
    }

    @keyframes backgroundPulse {
      0% { filter: brightness(1); }
      100% { filter: brightness(1.1); }
    }

    .login-container {
      background: #111;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: #ccc;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1.2rem;
      border: none;
      border-radius: 8px;
      background: #222;
      color: #fff;
      font-size: 1rem;
      transition: background 0.3s ease;
    }

    input:focus {
      background: #333;
      outline: none;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background: #e50914;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #ff1f3d;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Welcome Back</h2>
    <form id="signinForm">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required />

      <button type="submit">Login</button>
    </form>
  </div>

  <script>
    const firebaseConfig = {
    apiKey: "AIzaSyDQG7Z8K3qn__A5Nge43L5rCuLu1xqRGv8",
    authDomain: "martialworld-mvp.firebaseapp.com",
    projectId: "martialworld-mvp",
    storageBucket: "martialworld-mvp.firebasestorage.app",
    messagingSenderId: "308244643409",
    appId: "1:308244643409:web:a44e308d6219d8c3160270",
    measurementId: "G-1B777DWD7S"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    document.getElementById("signinForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !password) {
        alert("Please fill in both fields.");
        return;
      }

      // Find user by username
      db.collection("users").where("username", "==", username).get()
        .then((querySnapshot) => {
          if (querySnapshot.empty) {
            alert("Username not found.");
            return;
          }

          const userData = querySnapshot.docs[0].data();
          const email = userData.email;

          // Sign in with email and password
          firebase.auth().signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
              // Successful login
              window.location.href = "dashboard.html";
            })
            .catch((error) => {
              alert("Incorrect password.");
            });
        })
        .catch((error) => {
          console.error("Error fetching user:", error.message);
          alert("An error occurred. Please try again.");
        });
    });

  // (Removed duplicate Firebase config and signup form handler)
    </script>
</body>
</html>
