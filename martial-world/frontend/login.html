<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Martial World - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500&display=swap" rel="stylesheet">
  <!-- Firebase App -->
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
  <!-- Firebase Firestore -->
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>


  <style>
    body {
      margin: 0;
      font-family: 'Roboto Slab', serif;
      background: url('images/martial_login.png') no-repeat center center fixed;
      background-size: cover;
      color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      animation: backgroundPulse 10s infinite alternate ease-in-out;
    }

    @keyframes backgroundPulse {
      0% { filter: brightness(1); }
      100% { filter: brightness(1.1); }
    }

    .login-container {
      background-color: rgba(18, 18, 18, 0.95);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 1.2s ease-out forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      text-align: center;
      margin-bottom: 24px;
      color: #e53935;
      letter-spacing: 1px;
      animation: fadeIn 1s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: #ccc;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 18px;
      border: none;
      border-radius: 6px;
      background-color: #1e1e1e;
      color: #fff;
      font-size: 1rem;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    input:focus {
      background-color: #2a2a2a;
      outline: none;
      transform: scale(1.02);
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #e53935;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background-color: #d32f2f;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      animation: fadeIn 2s ease-in;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Welcome to Martial World</h2>
    <form id="loginForm">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" required />

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required />

      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm your password" required />

      <button type="submit">Submit</button>
      <div style="text-align: center; margin-top: 10px;">
        <span style="color: #ccc; font-size: 0.9rem;">Already a member?</span>
        <br />
        <a href="signin.html" style="color: #e53935; text-decoration: underline; font-weight: bold;">Sign in here</a>
      </div>

    </form>
    <div class="footer">Honor. Discipline. Community.</div>
  </div>

  <script>
  // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyDQG7Z8K3qn__A5Nge43L5rCuLu1xqRGv8",
      authDomain: "martialworld-mvp.firebaseapp.com",
      projectId: "martialworld-mvp",
      storageBucket: "martialworld-mvp.appspot.com",
      messagingSenderId: "308244643409",
      appId: "1:308244643409:web:a44e308d6219d8c3160270",
      measurementId: "G-1B777DWD7S"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    console.log("✅ Firebase initialized");

    // Attach form listener
    const form = document.getElementById("loginForm");
    if (form) {
      console.log("✅ Form listener attached");
      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        console.log("📝 Submitted values:", { username, email, password, confirmPassword });

        if (!username || !email || !password || !confirmPassword) {
          alert("Please fill in all fields.");
          return;
        }

        if (password !== confirmPassword) {
          alert("Passwords do not match.");
          return;
        }

        firebase.auth().createUserWithEmailAndPassword(email, password)
          .then((userCredential) => {
            const user = userCredential.user;
            console.log("✅ User created:", user.uid);

            return db.collection("users").doc(user.uid).set({
              username: username,
              email: email,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          })
          .then(() => {
            console.log("✅ User data stored in Firestore");
            alert("Account created successfully!");
            window.location.href = "signin.html";
          })
          .catch((error) => {
            console.error("❌ Signup error:", error.code, error.message);
            alert("Signup failed: " + error.message);
          });
      });
    } else {
      console.error("❌ Form element not found");
    }
</script>
</body>
</html>
