<!DOCTYPE html>
<html>
<head>
  <title>Martial Track</title>
  <link rel="stylesheet" href="assets/css/track.css">
</head>
<body>
  <h2>Martial Track</h2>

  <form id="syllabusForm">
    <input type="text" id="style" placeholder="Martial Art Style" required />
    <textarea id="syllabus" placeholder="Your syllabus..." required></textarea>
    <button type="submit">Save Syllabus</button>
  </form>

  <form id="dietForm">
    <textarea id="diet" placeholder="Your diet plan..." required></textarea>
    <button type="submit">Save Diet</button>
  </form>

  <form id="motivationForm">
    <textarea id="motivation" placeholder="Your motivation..." required></textarea>
    <button type="submit">Save Motivation</button>
  </form>

  <script src="assets/js/track.js"></script>
</body>
</html>
